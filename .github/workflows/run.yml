name: Bot Cryptone V11

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: bot-v11
  cancel-in-progress: true

jobs:

  run-bot:

    runs-on: ubuntu-latest

    timeout-minutes: 350

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore state
        uses: actions/cache@v3
        with:
          path: |
            data/
            logs/
            *.db
            *.json
          key: bot-${{ github.run_id }}
          restore-keys: |
            bot-

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          while true
          do
            python main.py
            echo "Restart in 10 sec..."
            sleep 10
          done

      - name: Save state
        if: always()
        uses: actions/cache/save@v3
        with:
          path: |
            data/
            logs/
            *.db
            *.json
          key: bot-${{ github.run_id }}
