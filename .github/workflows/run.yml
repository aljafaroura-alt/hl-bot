name: Bot Cryptone V11

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: bot-v11
  cancel-in-progress: true

jobs:

  run-bot:

    runs-on: ubuntu-latest

    timeout-minutes: 350

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore state
        uses: actions/cache@v3
        with:
          path: |
            data/
            logs/
            *.db
            *.json
          key: bot-${{ github.run_id }}
          restore-keys: |
            bot-

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug - Check Env Vars
        env:
          HL_TESTNET_WALLET_ADDRESS: ${{ secrets.HL_TESTNET_WALLET_ADDRESS }}
          HL_TESTNET_PRIVATE_KEY: ${{ secrets.HL_TESTNET_PRIVATE_KEY }}
        run: |
          python3 -c "
          import os
          addr = os.environ.get('HL_TESTNET_WALLET_ADDRESS')
          pk = os.environ.get('HL_TESTNET_PRIVATE_KEY')
          print(f'WALLET_ADDRESS set: {bool(addr)}, len={len(addr) if addr else 0}, value={addr!r}')
          print(f'PRIVATE_KEY set: {bool(pk)}, len={len(pk) if pk else 0}')
          "

      - name: Debug - Check Hyperliquid Testnet Balance
        run: |
          echo "===== CLEARINGHOUSE STATE (Perps) ====="
          curl -s -X POST https://api.hyperliquid-testnet.xyz/info \
            -H "Content-Type: application/json" \
            -d '{"type": "clearinghouseState", "user": "0x0BbAaeC7F90504573927a77d967Db1118680591f"}' \
            | python3 -m json.tool

      - name: Run Bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          HL_TESTNET_WALLET_ADDRESS: ${{ secrets.HL_TESTNET_WALLET_ADDRESS }}
          HL_TESTNET_PRIVATE_KEY: ${{ secrets.HL_TESTNET_PRIVATE_KEY }}
          HL_WALLET_ADDRESS: ${{ secrets.HL_WALLET_ADDRESS }}
          HL_PRIVATE_KEY: ${{ secrets.HL_PRIVATE_KEY }}
        run: |
          while true
          do
            python main.py
            echo "Restart in 10 sec..."
            sleep 10
          done

      - name: Save state
        if: always()
        uses: actions/cache/save@v3
        with:
          path: |
            data/
            logs/
            *.db
            *.json
          key: bot-${{ github.run_id }}
